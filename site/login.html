<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso — Squads</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}
.logo {
  width: 48px; height: 48px;
  background: #21C45D;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 22px; color: white;
  margin: 0 auto 24px;
}
h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
p { font-size: 14px; color: #8b949e; margin-bottom: 32px; line-height: 1.6; }
input {
  width: 100%;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 15px;
  color: #e6edf3;
  font-family: inherit;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: #21C45D; }
input::placeholder { color: #484f58; }
button {
  width: 100%;
  background: #21C45D;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s;
}
button:hover { background: #16a34a; }
button:disabled { background: #374151; cursor: not-allowed; }
.msg {
  margin-top: 16px;
  font-size: 13px;
  padding: 12px;
  border-radius: 8px;
  display: none;
}
.msg.success { background: rgba(33,196,93,0.1); color: #21C45D; border: 1px solid rgba(33,196,93,0.2); display: block; }
.msg.error { background: rgba(220,38,38,0.1); color: #f87171; border: 1px solid rgba(220,38,38,0.2); display: block; }
.footer { margin-top: 24px; font-size: 12px; color: #484f58; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">S</div>
  <h1>Acessar os Squads</h1>
  <p>Digite seu email de compra. Vamos enviar um link de acesso direto — sem senha.</p>
  <input type="email" id="email" placeholder="seu@email.com" />
  <button id="btn" onclick="enviarLink()">Enviar link de acesso</button>
  <div class="msg" id="msg"></div>
  <div class="footer">Problemas? Fale com o suporte.</div>
</div>

<script>
const SUPABASE_URL = 'https://vvzeczcfreebqtuhahyg.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2emVjemNmcmVlYnF0dWhhaHlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDM0NzEsImV4cCI6MjA5NjYxOTQ3MX0.ZF1B6yl27Kxi8_vZJ6yloVJozNPo06ttSbVafcOsH_Y'

const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

async function enviarLink() {
  const email = document.getElementById('email').value.trim().toLowerCase()
  const btn = document.getElementById('btn')
  const msg = document.getElementById('msg')

  if (!email || !email.includes('@')) {
    msg.className = 'msg error'
    msg.textContent = 'Digite um email válido.'
    return
  }

  btn.disabled = true
  btn.textContent = 'Enviando...'
  msg.className = 'msg'

  // Verifica se email está na tabela membros com status ativo
  const { data: status } = await sb
    .rpc('verificar_membro', { p_email: email })

  if (!status || status !== 'ativo') {
    msg.className = 'msg error'
    msg.textContent = 'Email não encontrado. Verifique se usou o mesmo email da compra.'
    btn.disabled = false
    btn.textContent = 'Enviar link de acesso'
    return
  }

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: 'https://lucasvalerio10.github.io/squads/site/aulas.html'
    }
  })

  if (error) {
    msg.className = 'msg error'
    msg.textContent = 'Algo deu errado. Tenta de novo.'
    btn.disabled = false
    btn.textContent = 'Enviar link de acesso'
    return
  }

  msg.className = 'msg success'
  msg.textContent = '✓ Link enviado! Verifique sua caixa de entrada (e o spam).'
  btn.textContent = 'Link enviado ✓'
}

document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') enviarLink()
})
</script>
</body>
</html>
